<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlight Dark Mode Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <input
        type="checkbox"
        id="theme-toggle"
        class="ease-toggle-input"
    >

    <label
        for="theme-toggle"
        class="ease-toggle"
        aria-label="Toggle Dark Mode"
    >
        <span class="ease-thumb"></span>
    </label>

</body>
</html>
